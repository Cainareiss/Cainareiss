name: profile automation

on:
  schedule:
    - cron: "0 3 * * *" # roda todo dia às 03:00 UTC
  workflow_dispatch: # permite rodar manualmente
  push:
    paths:
      - ".github/workflows/main.yml" # só re-roda se você mudar este arquivo

jobs:
  # 1) Cobrinha comendo o gráfico de contribuições
  snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gerar snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: Cainareiss
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: publicar na branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2) Streak stats — gera um SVG estático dentro do próprio repo (sem servidor externo)
  streak:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gerar streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Cainareiss&theme=dracula&hide_border=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit do streak.svg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "chore: atualizar streak stats" || echo "nada para commitar"
          git push

  # 3) Cards de perfil (stats, linguagens, repositório mais commitado) — 100% Node.js, sem Vercel
  summary-cards:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gerar profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Cainareiss
          BRANCH_NAME: profile-summary-card-output
